<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#000000"/>

  <title>Cordell's Bike Map</title>
  <link rel="icon" href="bicycle.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="BikeMap">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
  <script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
  <script type="text/javascript" src="bikeroutes.json"></script>
  
  <style>
    html, body {
        height: 100vh;
        width: 100%;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .wrapper {
        height: 100vh;
        width: 100%;
    }
    .map-wrapper {
        height: 100%;
        width: 100%;
    }
    #map {
        height: 100%;
        width: 100%;
    }
    #legend-toggle {
        position: absolute;
        right: 10px;
        top: 120px;
        width: 40px;
        height: 40px;
        z-index: 100;
        background: white;
        border-style: solid;
        border-width: 1px;
        border-color: rgba(0,0,0,0.2);
        border-radius: 4px;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 500;
        color: #333;
        box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    }
    #legend-toggle:hover {
        background-color: #f0f0f0;
    }
    #legend-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 200;
    }
    #legend-content {
        display: none;
        position: absolute;
        right: 10px;
        top: 165px;
        z-index: 300;
        width: 220px;
        background: white;
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.2);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        padding: 8px 0;
    }
    #legend-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 12px 8px;
        border-bottom: 1px solid #eee;
        margin-bottom: 8px;
    }
    #legend-header span {
        font-weight: 600;
        font-size: 14px;
        color: #333;
    }
    #legend-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #666;
        padding: 0 4px;
        line-height: 1;
    }
    #legend-close:hover {
        color: #333;
    }
    .legend-item {
        margin: 4px 12px;
        padding: 6px 8px;
        border-radius: 4px;
        font-weight: 600;
        font-size: 12px;
        text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        color: white;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .legend-line {
        width: 24px;
        height: 4px;
        border-radius: 2px;
        flex-shrink: 0;
    }
    .SIDEWALK_BIKELANE {
        background-color: #6CBE45;
    }
    .PROTECTED_BIKELANE {
        background-color: #00933C;
    }
    .STANDARD_BIKELANE {
        background-color: #0039A6;
    }
    .SHARED_BIKELANE {
        background-color: #FCCC0A;
        color: #333;
        text-shadow: none;
    }
    .LINK_BIKELANE {
        background-color: orange;
    }
    .SIGNED_ROUTE {
        background-color: red;
    }
    .legend-line.dashed {
        background: repeating-linear-gradient(
            90deg,
            currentColor 0px,
            currentColor 4px,
            transparent 4px,
            transparent 8px
        );
        height: 4px;
    }
    .maplibregl-popup-content {
        padding: 10px 14px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        border-radius: 6px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .popup-title {
        font-weight: 600;
        margin-bottom: 4px;
    }
    .popup-type {
        color: #666;
        font-size: 12px;
    }
  </style>
</head>
<body>
    <div class="wrapper">
        <div id="legend-toggle">Legend</div>
        <div id="legend-overlay"></div>
        <div id="legend-content">
            <div id="legend-header">
                <span>Bike Lane Types</span>
                <button id="legend-close">&times;</button>
            </div>
            <div class="legend-item PROTECTED_BIKELANE">
                Protected Path / Greenway
            </div>
            <div class="legend-item SIDEWALK_BIKELANE">
                Sidewalk / Boardwalk
            </div>
            <div class="legend-item STANDARD_BIKELANE">
                Standard / Curbside
            </div>
            <div class="legend-item SHARED_BIKELANE">
                Sharrows
            </div>
            <div class="legend-item LINK_BIKELANE">
                Link
            </div>
            <div class="legend-item SIGNED_ROUTE">
                Signed Route
            </div>
        </div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script>
        let DEFAULT_CENTER = [-73.97, 40.68];
        let MAX_BOUNDS = [
            [-74.1, 40.53],
            [-73.6, 40.95]
        ];
        let LINE_WIDTH = 8;
        let OPACITY = 0.75;
        // NY MTA Theme
        let SIDEWALK_BIKELANE = '#6CBE45';
        let PROTECTED_BIKELANE = '#00933C';
        let STANDARD_BIKELANE = '#0039A6';
        let SHARED_BIKELANE = '#FCCC0A';
        let LINK_BIKELANE = 'orange';
        let SIGNED_ROUTE = 'red';

        var map = new maplibregl.Map({
            container: 'map',
            style: 'https://api.maptiler.com/maps/b2512def-9887-424c-8274-dcae4a27558c/style.json?key=PhiQIVhvnvbs5yAOcy6M',
            center: DEFAULT_CENTER,
            maxBounds: MAX_BOUNDS,
            zoom: 13,
            minZoom: 11,
            maxZoom: 17,
            attributionControl: false,
            dragRotate: false,
            pitchWithRotate: false,
            touchPitch: false
        });

        map.on('load', async () => {
            map.addControl(
                new maplibregl.GeolocateControl({
                    positionOptions: {
                        enableHighAccuracy: true
                    },
                    trackUserLocation: true
                })
            );

            map.addControl(new maplibregl.NavigationControl({showCompass: false}));

            map.addSource('bikejson', {
                'type': 'geojson',
                'data': BIKEJSON
            })

            map.addLayer({
                'id': 'protected',
                'type': 'line',
                'source': 'bikejson',
                'paint': {
                    'line-color': PROTECTED_BIKELANE,
                    'line-width': LINE_WIDTH ,
                    'line-opacity': OPACITY
                },
                'filter': [
                    'any', 
                        ['==', ['get', 'ft_facilit'], 'Protected'],
                        ['==', ['get', 'tf_facilit'], 'Protected'],
                        ['==', ['get', 'grnwy'], 'Greenway']
                    
                ]
            });

            arrowLeftImage = await map.loadImage('arrow-left.png');
            arrowRightImage = await map.loadImage('arrow-right.png');
            map.addImage('arrow-left', arrowLeftImage.data);
            map.addImage('arrow-right', arrowRightImage.data);

            map.addLayer({
                'id': 'sidewalk',
                'type': 'line',
                'source': 'bikejson',
                'paint': {
                    'line-color': SIDEWALK_BIKELANE,
                    'line-width': LINE_WIDTH,
                    'line-opacity': OPACITY
                },
                'filter': [
                    'any',
                        ['==', ['get', 'ft_facilit'], 'Sidewalk'],
                        ['==', ['get', 'tf_facilit'], 'Sidewalk'],
                        ['==', ['get', 'ft_facilit'], 'Boardwalk'],
                        ['==', ['get', 'tf_facilit'], 'Boardwalk']
                ]
            });
        
            map.addLayer({
                'id': 'standards',
                'type': 'line',
                'source': 'bikejson',
                'paint': {
                    'line-color': STANDARD_BIKELANE,
                    'line-width': LINE_WIDTH ,
                    'line-opacity': OPACITY
                },
                'filter': [
                    'any',
                        ['==', ['get', 'ft_facilit'], 'Conventional'],
                        ['==', ['get', 'tf_facilit'], 'Conventional'],
                        ['==', ['get', 'ft_facilit'], 'Conventional Buffered'],
                        ['==', ['get', 'tf_facilit'], 'Conventional Buffered'],
                        ['==', ['get', 'ft_facilit'], 'Curbside'],
                        ['==', ['get', 'tf_facilit'], 'Curbside'],
                        ['==', ['get', 'ft_facilit'], 'Curbside Buffered'],
                        ['==', ['get', 'tf_facilit'], 'Curbside Buffered']
                ]
            });
        
            map.addLayer({
                'id': 'sharrows',
                'type': 'line',
                'source': 'bikejson',
                'paint': {
                    'line-color': SHARED_BIKELANE,
                    'line-width': LINE_WIDTH ,
                    'line-opacity': OPACITY
                },
                'filter': [
                    'any',
                        ['==', ['get', 'ft_facilit'], 'Shared'],
                        ['==', ['get', 'tf_facilit'], 'Shared']
                ]   
            });

            map.addLayer({
                'id': 'link',
                'type': 'line',
                'source': 'bikejson',
                'paint': {
                    'line-color': "orange",
                    'line-width': 12,
                    'line-opacity': OPACITY
                },
                'filter': [
                    'any',
                        ['==', ['get', 'ft_facilit'], 'Link'],
                        ['==', ['get', 'tf_facilit'], 'Link']
                ]
            });            

            map.addLayer({
                'id': 'signed-route',
                'type': 'line',
                'source': 'bikejson',
                'paint': {
                    'line-color': SIGNED_ROUTE,
                    'line-width': 4,
                    'line-opacity': OPACITY,
                    'line-dasharray': [2, 2]
                },
                'filter': [
                    'any',
                        ['==', ['get', 'ft_facilit'], 'Signed Route'],
                        ['==', ['get', 'tf_facilit'], 'Signed Route'],
                        ['==', ['get', 'ft_facilit'], 'Wide Parking Lane'],
                        ['==', ['get', 'tf_facilit'], 'Wide Parking Lane']
                ]
            });

            map.addLayer({
                'id': 'l-labels',
                'type': 'symbol',
                'source': 'bikejson',
                'layout': {
                    'icon-image': 'arrow-left',
                    'icon-size': 0.15,
                    'icon-rotation-alignment': 'map',
                    'symbol-placement': 'line-center',
                    'icon-allow-overlap': true,
                },
                'paint': {
                    'icon-opacity': 0.8
                },
                'filter': [
                    'any', 
                        ['==', ['get', 'bikedir'], 'L'],
                    
                ]
            });

            map.addLayer({
                'id': 'r-labels',
                'type': 'symbol',
                'source': 'bikejson',
                'layout': {
                    'icon-image': 'arrow-right',
                    'icon-size': 0.15,
                    'icon-rotation-alignment': 'map',
                    'symbol-placement': 'line-center',
                },
                'filter': [
                    'any', 
                        ['==', ['get', 'bikedir'], 'R'],
                    
                ]
            });

            const routeLayers = ['protected', 'sidewalk', 'standards', 'sharrows', 'link', 'signed-route'];
            
            routeLayers.forEach(layer => {
                map.on('click', layer, (e) => {
                    if (!e.features || e.features.length === 0) return;
                    
                    const feature = e.features[0];
                    const props = feature.properties;
                    const streetName = props.street || props.name || 'Unknown Street';
                    const facilityType = props.ft_facilit || props.tf_facilit || 'Bike Route';
                    
                    new maplibregl.Popup({ closeButton: true, closeOnClick: true })
                        .setLngLat(e.lngLat)
                        .setHTML(`
                            <div class="popup-title">${streetName}</div>
                            <div class="popup-type">${facilityType}</div>
                        `)
                        .addTo(map);
                });

                map.on('mouseenter', layer, () => {
                    map.getCanvas().style.cursor = 'pointer';
                });

                map.on('mouseleave', layer, () => {
                    map.getCanvas().style.cursor = '';
                });
            });
        });

        const legendContent = document.getElementById('legend-content');
        const legendOverlay = document.getElementById('legend-overlay');
        const legendToggle = document.getElementById('legend-toggle');
        const legendClose = document.getElementById('legend-close');

        function showLegend() {
            legendContent.style.display = 'block';
            legendOverlay.style.display = 'block';
        }

        function hideLegend() {
            legendContent.style.display = 'none';
            legendOverlay.style.display = 'none';
        }

        legendToggle.addEventListener('click', function() {
            if (legendContent.style.display === 'block') {
                hideLegend();
            } else {
                showLegend();
            }
        });

        legendClose.addEventListener('click', hideLegend);
        legendOverlay.addEventListener('click', hideLegend);
    </script>
</body>
</html>

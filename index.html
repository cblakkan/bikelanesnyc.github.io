<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#000000"/>

  <title>NYC Bike Lane Map | bikelanes.nyc</title>
  <meta name="description" content="A simple bike lane reference map for NYC. Browse protected paths, greenways, standard lanes, and cycling routes across all five boroughs." />
  <link rel="canonical" href="https://bikelanes.nyc/" />

  <!-- Open Graph -->
  <meta property="og:title" content="NYC Bike Lane Map" />
  <meta property="og:description" content="A simple bike lane reference map for NYC. Browse protected paths, greenways, standard lanes, and cycling routes across all five boroughs." />
  <meta property="og:url" content="https://bikelanes.nyc/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://bikelanes.nyc/preview.png" />
  <meta property="og:image:width" content="2400" />
  <meta property="og:image:height" content="1260" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NYC Bike Lane Map" />
  <meta name="twitter:description" content="A simple bike lane reference map for NYC. Browse protected paths, greenways, standard lanes, and cycling routes across all five boroughs." />
  <meta name="twitter:image" content="https://bikelanes.nyc/preview.png" />

  <link rel="icon" href="bicycle.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="BikeMap">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link href='https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.css' rel='stylesheet' />
  <script src='https://unpkg.com/maplibre-gl@5.19.0/dist/maplibre-gl.js'></script>
  <script type="text/javascript" src="bikeroutes.json"></script>

  <style>
    html, body {
        height: 100vh;
        width: 100%;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .wrapper {
        height: 100vh;
        width: 100%;
    }
    .map-wrapper {
        height: 100%;
        width: 100%;
    }
    #map {
        height: 100%;
        width: 100%;
    }

    /* Legend toggle button */
    #legend-toggle {
        position: absolute;
        right: 10px;
        top: 155px;
        width: 40px;
        height: 40px;
        z-index: 100;
        background: white;
        border: 1px solid rgba(0,0,0,0.2);
        border-radius: 8px;
        text-align: center;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        transition: background-color 0.15s ease;
    }
    #legend-toggle svg {
        width: 20px;
        height: 20px;
    }
    #legend-toggle:hover {
        background-color: #f0f0f0;
    }

    /* Legend overlay (click-away backdrop) */
    #legend-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 200;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
    }
    #legend-overlay.visible {
        opacity: 1;
        pointer-events: auto;
    }

    /* Legend content panel */
    #legend-content {
        position: absolute;
        right: 10px;
        top: 245px;
        z-index: 300;
        width: 220px;
        background: white;
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.2);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        padding: 8px 0;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #legend-content.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
    }

    #legend-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 14px 10px;
        border-bottom: 1px solid #eee;
        margin-bottom: 8px;
    }
    #legend-header span {
        font-weight: 600;
        font-size: 15px;
        color: #333;
    }
    #legend-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #666;
        padding: 0 4px;
        line-height: 1;
    }
    #legend-close:hover {
        color: #333;
    }

    /* Legend items: swatch + text on white background */
    .legend-item {
        margin: 2px 14px;
        padding: 7px 0;
        font-weight: 500;
        font-size: 13px;
        color: #333;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .legend-line {
        width: 24px;
        height: 4px;
        border-radius: 2px;
        flex-shrink: 0;
    }
    .legend-line.dashed {
        background: repeating-linear-gradient(
            90deg,
            #DC2626 0px,
            #DC2626 4px,
            transparent 4px,
            transparent 8px
        );
        height: 4px;
    }

    /* Palette toggle button */
    #palette-toggle {
        position: absolute;
        right: 10px;
        top: 200px;
        width: 40px;
        height: 40px;
        z-index: 100;
        background: white;
        border: 1px solid rgba(0,0,0,0.2);
        border-radius: 8px;
        user-select: none;
        -webkit-user-select: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        transition: background-color 0.15s ease;
    }
    #palette-toggle svg {
        width: 22px;
        height: 22px;
    }
    #palette-toggle:hover {
        background-color: #f0f0f0;
    }

    /* Palette picker panel */
    #palette-content {
        position: absolute;
        right: 10px;
        top: 245px;
        z-index: 300;
        width: 220px;
        background: white;
        border-radius: 8px;
        border: 1px solid rgba(0,0,0,0.2);
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        padding: 8px 0;
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #palette-content.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
    }
    #palette-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 14px 10px;
        border-bottom: 1px solid #eee;
        margin-bottom: 4px;
    }
    #palette-header span {
        font-weight: 600;
        font-size: 15px;
        color: #333;
    }
    #palette-close {
        background: none;
        border: none;
        font-size: 20px;
        cursor: pointer;
        color: #666;
        padding: 0 4px;
        line-height: 1;
    }
    #palette-close:hover {
        color: #333;
    }
    .palette-option {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        cursor: pointer;
        transition: background-color 0.1s ease;
    }
    .palette-option:hover {
        background-color: #f5f5f5;
    }
    .palette-option.active {
        background-color: #EEF2FF;
    }
    .palette-dots {
        display: flex;
        gap: 3px;
    }
    .palette-dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: block;
    }
    .palette-name {
        font-size: 13px;
        font-weight: 500;
        color: #333;
    }

    /* Popup styling */
    .maplibregl-popup-content {
        padding: 0 !important;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        overflow: hidden;
    }
    .maplibregl-popup-close-button {
        font-size: 18px;
        padding: 4px 8px;
        color: #666;
        right: 0;
        top: 0;
    }
    .maplibregl-popup-close-button:hover {
        color: #333;
        background: rgba(0,0,0,0.05);
    }
    .popup-inner {
        display: flex;
    }
    .popup-accent {
        width: 5px;
        flex-shrink: 0;
    }
    .popup-body {
        padding: 10px 14px;
    }
    .popup-title {
        font-weight: 600;
        margin-bottom: 4px;
    }
    .popup-type {
        color: #666;
        font-size: 12px;
    }

    /* MapLibre controls styling */
    .maplibregl-ctrl-group {
        border-radius: 8px !important;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15) !important;
        border: 1px solid rgba(0,0,0,0.2) !important;
    }
    .maplibregl-ctrl-group button {
        width: 40px !important;
        height: 40px !important;
    }
    .maplibregl-ctrl-group button:hover {
        background-color: #f0f0f0 !important;
    }
    .maplibregl-ctrl-group button + button {
        border-top: 1px solid rgba(0,0,0,0.1) !important;
    }
  </style>
</head>
<body>
    <div class="wrapper">
        <div id="legend-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round">
                <line x1="4" y1="6" x2="20" y2="6"/>
                <line x1="4" y1="12" x2="20" y2="12"/>
                <line x1="4" y1="18" x2="20" y2="18"/>
            </svg>
        </div>
        <div id="palette-toggle">
            <svg viewBox="0 0 24 24">
                <circle id="pdot-0" cx="8" cy="8" r="3.5" fill="#16A34A"/>
                <circle id="pdot-1" cx="16" cy="8" r="3.5" fill="#4F46E5"/>
                <circle id="pdot-2" cx="8" cy="16" r="3.5" fill="#EC4899"/>
                <circle id="pdot-3" cx="16" cy="16" r="3.5" fill="#EA580C"/>
            </svg>
        </div>
        <div id="legend-overlay"></div>
        <div id="legend-content">
            <div id="legend-header">
                <span>Bike Lane Types</span>
                <button id="legend-close">&times;</button>
            </div>
            <div class="legend-item">
                <div class="legend-line" data-layer="protected" style="background-color: #16A34A"></div>
                Protected Path / Greenway
            </div>
            <div class="legend-item">
                <div class="legend-line" data-layer="sidewalk" style="background-color: #84CC16"></div>
                Sidewalk / Boardwalk
            </div>
            <div class="legend-item">
                <div class="legend-line" data-layer="standards" style="background-color: #4F46E5"></div>
                Standard / Curbside
            </div>
            <div class="legend-item">
                <div class="legend-line" data-layer="sharrows" style="background-color: #EC4899"></div>
                Sharrows
            </div>
            <div class="legend-item">
                <div class="legend-line" data-layer="link" style="background-color: #EA580C"></div>
                Link
            </div>
            <div class="legend-item">
                <div class="legend-line dashed" data-layer="signed-route"></div>
                Signed Route
            </div>
        </div>
        <div id="palette-content">
            <div id="palette-header">
                <span>Color Theme</span>
                <button id="palette-close">&times;</button>
            </div>
            <div id="palette-options"></div>
        </div>
        <div class="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <script src="map.js"></script>
</body>
</html>
